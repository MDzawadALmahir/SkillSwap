<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo-wrap">
    <div class="logo-icon">S</div>
    <div>
      <div style="font-size:40px;font-weight:800;line-height:1;">SkillSwap</div>
      <div class="logo-sub">Time Banking System</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="login.html">Login</a>
    <a href="signup.html" class="active">Signup</a>
  </div>
</div>

<div class="container" style="max-width:400px;">
  <div class="card">
    <h2 style="text-align:center;font-size:36px;">Signup</h2>
    <p style="text-align:center;color:#64748b;margin-top:6px;">Create a new SkillSwap account</p>
    <p style="text-align:center;color:#16a34a;font-size:14px;margin-top:4px;">New members receive 3 free time credits to enroll in skill sessions.</p>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Phone (+8801XXXXXXXXX)">
    <input id="password" placeholder="Password" type="password">
    <p id="signupMessage" style="margin-top:8px; min-height:20px; color:#ef4444;"></p>
    <button class="btn" id="signupBtn" style="width:100%;margin-top:6px;">Create Account</button>
    <p style="margin-top:12px;text-align:center;font-size:15px;">
      Already have account? <a href="login.html">Login</a>
    </p>
    <p style="margin-top:8px;text-align:center;font-size:15px;">
      Creating an admin org account? <a href="admin_signup.html">Admin signup</a>
    </p>
  </div>
</div>

<script src="frontend-api.js"></script>
<script>
  const signupBtn = document.getElementById("signupBtn");
  const messageEl = document.getElementById("signupMessage");

  signupBtn.addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;

    messageEl.style.color = "#ef4444";
    messageEl.textContent = "";

    if (!name || !email || !phone || !password) {
      messageEl.textContent = "Please fill all fields.";
      return;
    }

    try {
      await apiRequest("/api/auth/signup", {
        method: "POST",
        body: JSON.stringify({ name, email, phone, password }),
      });
      messageEl.style.color = "#16a34a";
      messageEl.textContent = "Account created. Redirecting to login...";
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);
    } catch (error) {
      messageEl.textContent = error.message;
    }
  });
</script>


</body>
</html>
