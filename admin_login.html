<!DOCTYPE html>
<html>
<head>
  <title>SkillSwap | Admin Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
  <div class="logo-wrap">
    <div class="logo-icon">S</div>
    <div>
      <div style="font-size:40px;font-weight:800;line-height:1;">SkillSwap</div>
      <div class="logo-sub">Time Banking System · Admin</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="admin_login.html" class="active">Admin Login</a>
    <a href="admin_signup.html">Admin Signup</a>
    <a href="login.html">Member Login</a>
  </div>
</div>

<div class="container" style="max-width:440px;">
  <div class="card">
    <h2 style="text-align:center;font-size:32px;">Admin Login</h2>
    <p style="text-align:center;color:#64748b;margin-top:6px;">Administrator access only</p>
    <input id="identifier" placeholder="Email or phone number">
    <input id="password" placeholder="Password" type="password">
    <p id="msg" style="margin-top:8px; min-height:22px; color:#ef4444;"></p>
    <button class="btn" id="btn" style="width:100%;margin-top:6px;">Sign in as Admin</button>
    <p style="margin-top:14px;text-align:center;font-size:15px;">
      Need an admin account? <a href="admin_signup.html">Admin signup</a>
    </p>
  </div>
</div>

<script src="frontend-api.js"></script>
<script src="frontend-session.js"></script>
<script>
  document.getElementById("btn").addEventListener("click", async () => {
    const identifier = document.getElementById("identifier").value.trim();
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");
    msg.style.color = "#ef4444";
    msg.textContent = "";
    if (!identifier || !password) {
      msg.textContent = "Enter email or phone and password.";
      return;
    }
    try {
      const result = await apiRequest("/api/auth/login", {
        method: "POST",
        body: JSON.stringify({ identifier, password }),
      });
      if (result.user.role !== "admin") {
        msg.textContent = "This account is not an administrator. Use member login.";
        return;
      }
      setCurrentUser(result.user);
      msg.style.color = "#16a34a";
      msg.textContent = "Success. Redirecting...";
      window.location.href = "admin_overview.html";
    } catch (e) {
      msg.textContent = e.message;
    }
  });
</script>
</body>
</html>
